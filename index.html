<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Cricket Auction 2026 - Live</title>
    <style>
        :root {
            --gold: #FFD200; --sold: #27ae60; --unsold: #e74c3c;
            --dark: #1a0a2e; --village-blue: #3498db;
        }
        body { background-color: var(--dark); margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Arial', sans-serif; color: white; overflow: hidden; }
        
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
        }
        .start-btn {
            padding: 20px 50px; font-size: 30px; font-weight: bold;
            background: var(--gold); border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 20px var(--gold);
        }
        
        .stats-bar { display: flex; gap: 30px; background: rgba(0,0,0,0.6); padding: 10px 40px; border-radius: 50px; margin-bottom: 15px; font-size: 18px; }
        .budget-board { display: flex; gap: 12px; margin-bottom: 20px; overflow-x: auto; max-width: 95%; padding-bottom: 10px; }
        .team-budget-card { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; border-bottom: 3px solid var(--gold); text-align: center; min-width: 120px; flex-shrink: 0; }
        .mini-logo { width: 40px; height: 40px; border-radius: 50%; background: white; margin-bottom: 5px; object-fit: contain; }
        
        .auction-card { width: 950px; display: flex; align-items: center; position: relative; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .image-container { width: 300px; height: 300px; border-radius: 50%; border: 10px solid var(--gold); overflow: hidden; background: white; flex-shrink: 0; z-index: 10; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        #p-img { width: 100%; height: 100%; object-fit: cover; }
        
        .info-panel { margin-left: -80px; flex-grow: 1; z-index: 5; }
        .strip { background: var(--gold); margin-bottom: 10px; padding: 12px 20px 12px 110px; font-weight: 900; text-transform: uppercase; clip-path: polygon(0% 0%, 95% 0%, 100% 100%, 0% 100%); color: #000; font-size: 24px; }
        #p-name { font-size: 38px; color: #000; }
        #p-village { background: var(--village-blue); color: white; width: fit-content; min-width: 300px; }

        #status-sticker { 
            position: absolute; top: 20px; right: 50px; padding: 10px 40px; font-size: 70px; font-weight: 900; 
            border: 10px double; transform: rotate(-15deg); z-index: 100; display: none; background: rgba(0,0,0,0.8);
        }
        .sold-sticker { color: var(--sold); border-color: var(--sold); }
        .unsold-sticker { color: var(--unsold); border-color: var(--unsold); }

        #buyer-display { position: absolute; bottom: 30px; right: 50px; display: none; flex-direction: column; align-items: center; z-index: 50; animation: bounceIn 0.6s ease; }
        .buyer-logo-main { width: 120px; height: 120px; border-radius: 50%; border: 5px solid white; background: white; box-shadow: 0 0 20px var(--gold); }
        .buyer-name-tag { background: white; color: black; padding: 5px 20px; border-radius: 20px; font-weight: bold; margin-top: -10px; border: 2px solid var(--gold); font-size: 20px; }

        @keyframes bounceIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        .controls-container { margin-top: 20px; text-align: center; width: 90%; }
        .live-bid-box { display: flex; align-items: center; justify-content: center; gap: 20px; background: rgba(0,0,0,0.5); padding: 15px 40px; border-radius: 50px; border: 2px solid var(--gold); margin-bottom: 15px; }
        #current-bidder-logo { width: 60px; height: 60px; border-radius: 50%; background: white; display: none; border: 2px solid var(--gold); }
        
        .bid-btn { background: var(--gold); color: black; padding: 10px 20px; margin: 5px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .bid-btn:hover { transform: scale(1.05); background: white; }
        .action-btn { background: var(--sold); color: white; font-size: 18px; padding: 12px 30px; border-radius: 10px; cursor: pointer; border:none; margin: 5px; }
        #next-btn { background: white; color: black; display: none; }
        #login-screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--dark); display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 2000;
}
.pin-input {
    padding: 15px; font-size: 24px; text-align: center;
    border-radius: 10px; border: 2px solid var(--gold);
    background: #000; color: white; width: 200px; margin-bottom: 20px;
}

    </style>
</head>
<body>
    <div id="login-screen">
        <h2 style="color: var(--gold);">ENTER ADMIN PIN</h2>
        <input type="password" id="admin-pin" class="pin-input" placeholder="****" maxlength="4">
        <button class="start-btn" onclick="checkPin()">LOGIN</button>
        <p id="login-msg" style="color: var(--unsold); margin-top: 10px;"></p>
    </div>


    <div id="start-screen">
        <h1 style="margin-bottom: 30px; color: var(--gold);">CRICKET AUCTION 2026</h1>
        <button class="start-btn" onclick="startNow()">START AUCTION 🏏</button>
    </div>

    <div class="stats-bar">
        <span>Total Players: <span id="stat-total">0</span></span>
        <span style="color:var(--sold)">Sold: <span id="stat-sold-count">0</span></span>
        <span style="color:var(--unsold)">Unsold: <span id="stat-unsold-count">0</span></span>
    </div>

    <div class="budget-board" id="budget-board"></div>

    <div class="auction-card">
        <div id="status-sticker">SOLD</div>
        <div id="buyer-display">
            <img id="buyer-img" class="buyer-logo-main" src="">
            <div id="buyer-name-text" class="buyer-name-tag">TEAM NAME</div>
        </div>

        <div class="image-container"><img id="p-img" src="" alt="Player"></div>
        <div class="info-panel">
            <div class="strip" id="p-name">Loading...</div>
            <div class="strip" id="p-role">Role</div>
            <div class="strip" id="p-village">Village</div>
        </div>
    </div>

    <div class="controls-container">
        <div class="live-bid-box">
            <img id="current-bidder-logo" src="">
            <div>
                <span style="font-size: 36px; font-weight: bold; color: var(--gold);">₹ <span id="current-bid">0</span></span>
                <span id="highest-bidder-name" style="margin-left: 15px; font-size: 20px; opacity: 0.8;">Base Price</span>
            </div>
        </div>
        <div id="timer" style="font-size: 20px; margin-bottom: 10px;">Time Left: 30s</div>
        
        <div id="bid-controls"></div>
        
        <button class="action-btn" id="sold-btn" onclick="markSold()">🔨 SOLD / UNSOLD</button>
        <button class="action-btn" id="next-btn" onclick="nextPlayer()">Next Player ➡️</button>
    </div>

    <script>
        const SHEETDB_URL = "https://sheetdb.io/api/v1/hmnl6d2mebhrn"; 
        const SOURCE_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRVVcdIHNTkhIvlT3wmIKl-skCBvVg8b8vFAArgpS1p-w8LuykaeLeGjo3DFYIIySAfxiu4lvbm5VGK/pub?output=csv";

        let players = [], teamData = {}, budgets = {};
        let currentIndex = 0, currentBid = 0, highestBidder = "None", timer, timeLeft = 30;
        let soldCount = 0, unsoldCount = 0;

        async function initAuction() {
            try {
                const res = await fetch(SOURCE_CSV);
                const data = await res.text();
                const rows = data.split('\n').slice(1);
                
                rows.forEach(row => {
                    const c = row.split(',');
                    if(c[0] && c[0].trim() !== "") {
                        players.push({ 
                            name: c[0].trim(), 
                            role: c[1]?.trim() || "All Rounder", 
                            village: c[2]?.trim() || "Unknown", 
                            base: parseInt(c[3]) || 50, 
                            img: c[4]?.trim() 
                        });
                        const tName = c[5]?.trim(); 
                        const tLogo = c[6]?.trim(); 
                        if(tName && tLogo && !teamData[tName]) {
                            teamData[tName] = tLogo;
                            budgets[tName] = 3000; 
                        }
                    }
                });

                document.getElementById('stat-total').innerText = players.length;
                renderTeams();
                loadPlayer(0);
            } catch (e) { console.error("Data Load Error:", e); }
        }

        function renderTeams() {
            const board = document.getElementById('budget-board');
            const controls = document.getElementById('bid-controls');
            board.innerHTML = ''; 
            controls.innerHTML = '';

            Object.keys(teamData).forEach(team => {
                board.innerHTML += `
                    <div class="team-budget-card">
                        <img src="${teamData[team]}" class="mini-logo">
                        <div style="font-weight:bold">${team}</div>
                        <div style="color:var(--gold)">₹ ${budgets[team]}</div>
                    </div>`;
                
                controls.innerHTML += `
                    <button class="bid-btn" onclick="placeBid('${team}')">${team} +50</button>`;
            });
        }

        function loadPlayer(index) {
            if (index >= players.length) {
                alert("Auction Completed!");
                return;
            }
            currentIndex = index;
            const p = players[index];
            currentBid = p.base;
            highestBidder = "None";
            
            document.getElementById('p-img').src = p.img || 'https://placeholder.com';
            document.getElementById('p-name').innerText = p.name;
            document.getElementById('p-role').innerText = p.role;
            document.getElementById('p-village').innerText = p.village;
            document.getElementById('current-bid').innerText = currentBid;
            document.getElementById('highest-bidder-name').innerText = "Base Price";
            
            resetUI();
            startTimer();
        }

function placeBid(team) {
    const sticker = document.getElementById('status-sticker');
    if (sticker.style.display === 'block') {
        return; // Function yahi ruk jayega
    }

    if (budgets[team] < currentBid + 50) {
        alert("Insufficient Budget!");
        return;
    }

    currentBid += 10;
    highestBidder = team;
    
    document.getElementById('current-bid').innerText = currentBid;
    document.getElementById('highest-bidder-name').innerText = team;
    document.getElementById('current-bidder-logo').src = teamData[team];
    document.getElementById('current-bidder-logo').style.display = 'block';
    resetTimer();
    }
function markSold() {
    clearInterval(timer);
    const sticker = document.getElementById('status-sticker');
    const buyerDisplay = document.getElementById('buyer-display');
    const playerName = players[currentIndex].name; 

    if (highestBidder !== "None") {
        // SOLD Logic
        sticker.innerText = "SOLD";
        sticker.className = "sold-sticker";
        budgets[highestBidder] -= currentBid;
        soldCount++;
        
        document.getElementById('buyer-img').src = teamData[highestBidder];
        document.getElementById('buyer-name-text').innerText = highestBidder;
        buyerDisplay.style.display = 'flex';
        
        syncToSheet(playerName, highestBidder, currentBid); 
    } else {
        // UNSOLD Logic
        sticker.innerText = "UNSOLD";
        sticker.className = "unsold-sticker";
        unsoldCount++;
        
        syncToSheet(playerName, "None", 0); 
    }
    
    sticker.style.display = 'block';
    document.getElementById('sold-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'inline-block';
    updateStats();
    renderTeams();
}



    async function syncToSheet(player, team, price) {
    const status = (team === "None" || !team) ? "UNSOLD" : "SOLD";
    const buyerTeam = (team === "None" || !team) ? "-" : team;

    try {
        await fetch(SHEETDB_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                data: [{ 
                    "Player": player,      // आपकी शीट में 'Player' कॉलम होना चाहिए
                    "Status": status,      // आपकी शीट में 'Status' कॉलम होना चाहिए
                    "Team": buyerTeam,     // आपकी शीट में 'Team' कॉलम होना चाहिए
                    "Price": price,        // आपकी शीट में 'Price' कॉलम होना चाहिए
                    "Time": new Date().toLocaleString() 
                }] 
            })
        });
        console.log("Data Synced Successfully!");
    } catch (e) { 
        console.error("SheetDB Sync Error:", e); 
    }
}


        function nextPlayer() { loadPlayer(currentIndex + 1); }

        function startNow() { 
            document.getElementById('start-screen').style.display = 'none'; 
            initAuction(); 
        }

        function updateStats() {
            document.getElementById('stat-sold-count').innerText = soldCount;
            document.getElementById('stat-unsold-count').innerText = unsoldCount;
        }

        function resetUI() {
            document.getElementById('status-sticker').style.display = 'none';
            document.getElementById('buyer-display').style.display = 'none';
            document.getElementById('sold-btn').style.display = 'inline-block';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('current-bidder-logo').style.display = 'none';
        }
       
        function startTimer() {
            timeLeft = 30;
            document.getElementById('timer').innerText = `Time Left: ${timeLeft}s`;
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = `Time Left: ${timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    markSold();
                }
            }, 1000);
        }

        function resetTimer() { 
            clearInterval(timer); 
            startTimer(); 
        }
        const CORRECT_PIN = "9809";

function checkPin() {
    const enteredPin = document.getElementById('admin-pin').value;
    const msg = document.getElementById('login-msg');
    
    if (enteredPin === CORRECT_PIN) {
        document.getElementById('login-screen').style.display = 'none';
    } else {
        msg.innerText = "Wrong PIN! Try again.";
        document.getElementById('admin-pin').value = "";
    }
}

document.getElementById('admin-pin')?.addEventListener('keypress', function (e) {
    if (e.key === 'Enter') checkPin();
});

    </script>
</body>
</html>
